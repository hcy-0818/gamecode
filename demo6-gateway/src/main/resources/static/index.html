<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏账号交易平台 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #0f0f23;
            --bg-card: rgba(18, 18, 42, 0.8);
            --accent: #6c5ce7;
            --accent-glow: #a78bfa;
            --neon-blue: #00d4ff;
            --neon-purple: #b44dff;
            --text-primary: #e8e8f0;
            --text-secondary: #8b8ba0;
            --border: rgba(108, 92, 231, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(ellipse 60% 50% at 20% 30%, rgba(108,92,231,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,212,255,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(180,77,255,0.05) 0%, transparent 60%);
        }

        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 
                0 0 60px rgba(108, 92, 231, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.4);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 40px rgba(108, 92, 231, 0.4); }
            50% { box-shadow: 0 0 60px rgba(108, 92, 231, 0.6), 0 0 80px rgba(0, 212, 255, 0.3); }
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-blue), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--neon-blue));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
        }

        .register-link {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .register-link a {
            color: var(--accent-glow);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }

        .msg.show {
            display: block;
        }

        .msg.error {
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
        }

        .msg.success {
            background: rgba(0, 230, 118, 0.15);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: #00e676;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .role-hint {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-wrapper">
                    <i class="fas fa-gamepad"></i>
                </div>
                <div class="login-title">GAME VAULT</div>
                <div class="login-subtitle">游戏账号交易平台</div>
            </div>

            <div id="loginMsg" class="msg"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span id="btnText">登 录</span>
                    <span id="btnSpinner" class="loading-spinner" style="display:none;"></span>
                </button>
            </form>

            <div class="login-footer">
                <p class="register-link">
                    还没有账号？ <a href="/register.html">立即注册</a>
                </p>
                <p class="role-hint">
                    系统将根据账号角色自动跳转至对应界面
                </p>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showMsg('请输入用户名和密码', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = true;
            btnText.textContent = '登录中...';
            btnSpinner.style.display = 'inline-block';

            try {
                const res = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const d = await res.json();

                if (d.code !== 200) {
                    throw new Error(d.message || '登录失败');
                }

                // 保存 JWT Token 和用户信息
                localStorage.setItem('jwt_token', d.data.token);
                localStorage.setItem('user_info', JSON.stringify(d.data));

                showMsg('登录成功，正在跳转...', 'success');

                setTimeout(() => {
                    const role = d.data.role;
                    if (role === 'ADMIN') {
                        window.location.href = '/game-account-manager.html';
                    } else {
                        window.location.href = '/user-index.html';
                    }
                }, 1000);

            } catch (e) {
                showMsg(e.message, 'error');
            } finally {
                btn.disabled = false;
                btnText.textContent = '登 录';
                btnSpinner.style.display = 'none';
            }
        }

        function showMsg(text, type) {
            const el = document.getElementById('loginMsg');
            el.textContent = text;
            el.className = `msg msg-${type} show`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleLogin(new Event('submit'));
            }
        });
    </script>
</body>
</html>
