# ========== Standalone 模式 — 无需 Nacos，Gateway 直连各服务 ==========
spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**,/api/admin/login,/api/admin/logout,/api/admin/users/**
          filters:
            - StripPrefix=0

        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/account/**,/api/registration/**,/api/admin/registrations,/api/admin/registrations/**,/api/admin/approve/**,/api/admin/reject/**,/api/admin/registration/**,/api/admin/account/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/order/**,/api/admin/orders,/api/admin/orders/**,/api/admin/order/**
          filters:
            - StripPrefix=0

        - id: bargain-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/bargain/**
          filters:
            - StripPrefix=0

    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
