server:
  port: 8082

spring:
  application:
    name: account-service
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    bootstrap:
      enabled: true
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
      config:
        import-check:
          enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/game_trade?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  sql:
    init:
      mode: never
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:demo6-cloud-jwt-secret-key-2024-microservice}
  expiration: 1800000
